<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Facebook OAuth Callback — Chappy's Enter Price</title>
  <style>
    :root { color-scheme: dark; --bg:#0b0d10; --card:#141820; --ink:#f4f0e8; --muted:#a9b0bb; --gold:#c8a45d; --line:rgba(244,240,232,.16); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:radial-gradient(circle at 70% 10%, rgba(200,164,93,.18), transparent 34%), var(--bg); color:var(--ink); font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; padding:24px; }
    main { width:min(760px, 100%); background:rgba(20,24,32,.94); border:1px solid var(--line); box-shadow:0 28px 80px rgba(0,0,0,.34); padding:32px; }
    .eyebrow { color:var(--gold); font-size:12px; font-weight:900; letter-spacing:.18em; text-transform:uppercase; margin:0 0 14px; }
    h1 { margin:0; font-size:clamp(34px, 6vw, 58px); line-height:.95; letter-spacing:-.05em; text-transform:uppercase; }
    p { color:var(--muted); line-height:1.55; }
    .box { margin-top:22px; padding:18px; border:1px solid var(--line); background:rgba(11,13,16,.54); overflow-wrap:anywhere; }
    .ok { color:#8ee6a3; font-weight:900; }
    .warn { color:#f1c76f; font-weight:900; }
    button { margin-top:14px; min-height:44px; border:1px solid var(--gold); background:var(--gold); color:#0b0d10; font-weight:900; letter-spacing:.08em; text-transform:uppercase; padding:0 16px; cursor:pointer; }
    code { color:var(--ink); }
    a { color:var(--gold); }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Chappy OAuth callback</p>
    <h1>Facebook callback received.</h1>
    <p id="summary">Checking returned authorization data…</p>
    <div class="box" id="details">Loading…</div>
    <button id="copy" type="button">Copy callback URL</button>
    <p>This page is intentionally static. It does not send tokens or codes anywhere. Use it only to complete developer-console setup or local token exchange.</p>
    <p><a href="/">Back to Chappy's Enter Price</a></p>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const hash = new URLSearchParams(window.location.hash.replace(/^#/, ''));
    const code = params.get('code') || hash.get('code');
    const state = params.get('state') || hash.get('state');
    const error = params.get('error') || hash.get('error');
    const accessToken = hash.get('access_token') || params.get('access_token');
    const mask = value => value ? value.slice(0, 8) + '…' + value.slice(-6) : '';
    const summary = document.getElementById('summary');
    const details = document.getElementById('details');
    if (error) {
      summary.innerHTML = '<span class="warn">Authorization returned an error.</span>';
      details.textContent = 'error=' + error + '
state=' + (state || '(none)');
    } else if (code || accessToken) {
      summary.innerHTML = '<span class="ok">Authorization data is present.</span>';
      details.textContent = [
        'platform=facebook',
        'code=' + (code ? mask(code) : '(none)'),
        'access_token=' + (accessToken ? mask(accessToken) : '(none)'),
        'state=' + (state || '(none)'),
        'full_url_available_via_copy_button=true'
      ].join('
');
    } else {
      summary.innerHTML = '<span class="warn">No code/token in URL yet.</span>';
      details.textContent = 'Use this URL as redirect/callback in the developer console. After login, TikTok/Facebook will redirect back here with code or token data.';
    }
    document.getElementById('copy').addEventListener('click', async () => {
      await navigator.clipboard.writeText(window.location.href);
      document.getElementById('copy').textContent = 'Copied';
    });
  </script>
</body>
</html>
